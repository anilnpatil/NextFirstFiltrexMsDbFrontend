<!-- CHART -->
<div class="trend-body">
  <div class="chart-card">
    <!-- Compare Mode Controls -->
    <div class="compare-mode-panel" *ngIf="compareModeEnabled">
      <div class="compare-header">
        <div class="compare-items-header">
          <div *ngFor="let item of compareItems" class="compare-header-item" [style.borderLeftColor]="item.color">
            <span class="item-name" [style.color]="item.color">{{ item.name }}</span>
            <button (click)="removeCompareItem(item.id)" class="header-remove-btn">×</button>
          </div>
          <button (click)="showAddItemModal = true" class="add-more-btn" *ngIf="compareItems.length < 18 && !showAddItemModal">
            + Add Item
          </button>
          <button (click)="clearAllCompareItems()" class="clear-btn">
          🗑️ Clear All
        </button>
        <button (click)="resetCompareToDefault()" class="reset-btn">
          🔄 Reset
        </button>
        </div>
      </div>
      
      <div class="compare-controls" *ngIf="showAddItemModal">
        <div class="add-compare-item">
          <select [(ngModel)]="selectedCompareType">
            <option value="sku">Compare by SKU</option>
            <option value="shift">Compare by Shift</option>
          </select>
          
          <select *ngIf="selectedCompareType === 'sku'" [(ngModel)]="selectedCompareSKU">
            <option *ngFor="let sku of availableSKUs" [value]="sku.value">
              {{ sku.label }}
            </option>
          </select>
          
          <select *ngIf="selectedCompareType === 'shift'" [(ngModel)]="selectedCompareShift">
            <option *ngFor="let shift of availableShifts" [value]="shift.value">
              {{ shift.label }}
            </option>
          </select>
          
          <button (click)="addCompareItem()" [disabled]="compareItems.length >= 18">
            Add to Compare
          </button>
          <button (click)="showAddItemModal = false" class="cancel-btn">
            Cancel
          </button>
        </div>
      </div>      
    </div>
    
    <!-- Chart Container -->
    <div class="chart-container">
      <apx-chart 
        *ngIf="!loading && chartSeries.length > 0"
        [series]="chartSeries"
        [chart]="chartOptions"
        [xaxis]="xaxisOptions"
        [yaxis]="yaxisOptions"
        [title]="chartTitle"
        [plotOptions]="plotOptions"
        [dataLabels]="dataLabels"
        [stroke]="stroke"
        [fill]="fill"
        [tooltip]="tooltip"
        [legend]="legend"
        [grid]="grid">
      </apx-chart>
      
      <div *ngIf="loading" class="loading-placeholder">
        <div class="spinner"></div>
        <p>Loading chart data...</p>
      </div>
      
      <div *ngIf="!loading && chartSeries.length === 0 && !errorMessage" class="no-data">
        <p>No data available. Please adjust your filters.</p>
      </div>
    </div>
    
    <div class="error-banner" *ngIf="errorMessage">
      <strong>Error:</strong> {{ errorMessage }}
    </div>
  </div>
</div>
