<!-- TABLE WRAPPER -->
<div class="table-wrapper">
  <table class="report-table" *ngIf="!loading && data.length">
    <thead>
      <tr>
        <th class="col-text">Period</th>
        <th class="col-date">From</th>
        <th class="col-date">To</th>
        <th class="col-text">Shift</th>
        <th class="col-text">SKU</th>
        <th class="col-num">Total</th>
        <th class="col-num">OK</th>
        <th class="col-num">NOT OK</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of data">
         <td class="col-text">{{ r.periodKey }}</td>
          <td class="col-date">{{ r.fromDate }}</td>
          <td class="col-date">{{ r.toDate }}</td>
          <td class="col-text">{{ r.shift }}</td>
          <td class="col-text">{{ r.sku }}</td>
          <td class="col-num">{{ r.totalCount }}</td>
          <td class="col-num">{{ r.okCount }}</td>
          <td class="col-num">{{ r.notOkCount }}</td>
      </tr>
    </tbody>
  </table>

  <div class="empty" *ngIf="!loading && !data.length">
    No data available
  </div>

  <div class="loading" *ngIf="loading">
    Loading data...
  </div>
</div>
