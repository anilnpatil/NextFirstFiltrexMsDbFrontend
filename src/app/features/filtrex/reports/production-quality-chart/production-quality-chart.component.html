<div class="quality-root">
  <div class="quality-body">
    <div class="periods-row" *ngIf="periods.length">
      <div class="period-card" *ngFor="let p of periods">
          <div class="ring-large" [ngStyle]="p.style">
            <div class="top-percent">{{ p.okPerc }}%</div>

            <!-- OK label placed along arc using wrapper/inner rotation -->
            <div class="label-wrapper" [style.transform]="p.okLabelWrapper">
              <div class="segment-label ok" [style.transform]="p.okLabelInner">{{ p.okCount | number }}</div>
            </div>

            <!-- NOT OK label -->
            <div class="label-wrapper" [style.transform]="p.notOkLabelWrapper">
              <div class="segment-label notok" [style.transform]="p.notOkLabelInner">{{ p.notOkCount | number }}</div>
            </div>

            <div class="ring-center">
              <div class="total-count">{{ p.totalCount | number }}</div>
            </div>
          </div>

          <div class="meta">
            <div class="period">{{ p.periodKey }}</div>
            <div class="range">{{ p.fromDate }} — {{ p.toDate }}</div>
            <div class="ppm">PPM: <strong>{{ p.ppm | number }}</strong></div>
          </div>
      </div>
    </div>

    <div class="loading-overlay" *ngIf="loading">Loading quality data...</div>
    <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</div>
